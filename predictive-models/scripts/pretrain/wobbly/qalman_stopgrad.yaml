defaults:
  - _self_
  - wandb: private.yaml
  - override hydra/hydra_logging: disabled
  - override hydra/job_logging: disabled

# disable hydra outputs
hydra:
  output_subdir: null
  run:
    dir: .


name: "qalmanSSL_wobbly_stopgrad" 
method: "qalmanSSL"
method_kwargs:
  state_dim: &latent_state_dim 2
  input_dim: &image_dim 100
  rnn_hidden_dim: &hidden_dim 10
  rnn_num_layers: 1
  encoder_hidden_dim: 200
  encoder_hidden_layers: 10
  variance_dependency: "None"
  loss_type: "stopgrad"
  predictor_lr_multiplier: 30.0
  encoder_lr_multiplier: 2.0
  rnn_lr_multiplier: 20.0
decoder_kwargs:
  observations:
    loss_func: "mse"
    input_variable: "estimates"
    input_dim: *hidden_dim
    output_dim: *image_dim
    backbone: "mlp"
    backbone_kwargs:
      hidden_dim: 100
      n_hidden_layers: 2
    lr: 0.1
  pos:
    loss_func: "mse"
    input_variable: "inferences"
    input_dim: *latent_state_dim #*hidden_dim
    output_dim: 2
    backbone: "linear"
    lr: 0.5
data:
  dataset: "dot_motion"
  num_workers: 4
  settings:
    motion_type: "wobbly"
    num_train_sequences: 20000
    num_test_sequences: 32
    seq_len: 100
    image_dim: 10
    dt: 0.3
    period_duration: 1.0
    noise_type: "gaussian"
    observation_noise: 0.0
    prediction_noise: 0.1
    post_processing: "distort"
    seed: 1
optimizer:
  name: "adam"
  batch_size: 128
  lr: 0.0025
  weight_decay: 1e-6
scheduler:
  name: "warmup_cosine"
  min_lr: 5e-05
  warmup_epochs: 10
  warmup_start_lr: 0.0
  # lr_decay_steps: [0.5, 0.75]
checkpoint:
  enabled: True
  dir: "trained_models"
  frequency: 1
auto_resume:
  enabled: False

# Trainer settings
max_epochs: 20
val_check_interval: 10
devices: [0]
sync_batchnorm: True
accelerator: "gpu"
strategy: "ddp"
precision: 32-true # needed for matrix inverse
